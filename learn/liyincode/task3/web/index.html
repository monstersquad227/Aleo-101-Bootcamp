<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <title>Private Score Gate</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #18212f;
        background: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(920px, 100%);
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 28px;
        align-items: stretch;
      }

      section,
      aside {
        background: #ffffff;
        border: 1px solid #dfe5ee;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(33, 49, 76, 0.08);
      }

      section {
        padding: 30px;
      }

      aside {
        padding: 26px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 32px;
        line-height: 1.15;
      }

      h2 {
        margin-bottom: 8px;
        font-size: 20px;
      }

      p {
        color: #4d5b6d;
        line-height: 1.6;
      }

      label {
        display: grid;
        gap: 8px;
        margin-top: 18px;
        color: #273449;
        font-weight: 650;
      }

      input {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 12px 14px;
        font: inherit;
        color: #18212f;
      }

      button {
        width: 100%;
        margin-top: 22px;
        border: 0;
        border-radius: 8px;
        padding: 13px 18px;
        background: #155eef;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #0f4ed1;
      }

      .result {
        min-height: 126px;
        border-radius: 8px;
        border: 1px solid #d8e1ef;
        background: #f8fafc;
        padding: 18px;
      }

      .result strong {
        display: block;
        margin-bottom: 6px;
        font-size: 24px;
      }

      .passed strong {
        color: #047857;
      }

      .failed strong {
        color: #b42318;
      }

      code {
        display: block;
        overflow-x: auto;
        border-radius: 8px;
        background: #111827;
        color: #d1fae5;
        padding: 16px;
        line-height: 1.55;
        white-space: pre;
      }

      .pill {
        width: fit-content;
        border-radius: 999px;
        background: #e8f0ff;
        color: #174ea6;
        padding: 6px 11px;
        font-size: 13px;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <div class="pill">Leo privacy demo</div>
        <h1>Private Score Gate</h1>
        <p>输入私密分数和公开门槛。前端只展示是否通过，模拟 Leo record 中 `score` 私有、`threshold` 公开的资格校验流程。</p>

        <label>
          私密分数
          <input id="score" type="number" min="0" max="100" value="86">
        </label>

        <label>
          公开门槛
          <input id="threshold" type="number" min="0" max="100" value="75">
        </label>

        <button id="verify" type="button">生成证明并校验</button>
      </section>

      <aside>
        <h2>校验结果</h2>
        <div id="result" class="result passed">
          <strong>通过</strong>
          <p>只公开 eligibility = true。原始分数不会展示给链上观察者。</p>
        </div>
        <h2>对应 Leo 逻辑</h2>
        <code>fn is_eligible(card: ScoreCard) -> bool {
    return card.score >= card.threshold;
}</code>
      </aside>
    </main>

    <script>
      const scoreInput = document.querySelector('#score')
      const thresholdInput = document.querySelector('#threshold')
      const result = document.querySelector('#result')
      const verifyButton = document.querySelector('#verify')

      function renderResult() {
        const score = Number(scoreInput.value)
        const threshold = Number(thresholdInput.value)
        const passed = score >= threshold

        result.className = `result ${passed ? 'passed' : 'failed'}`
        result.innerHTML = `
          <strong>${passed ? '通过' : '未通过'}</strong>
          <p>公开结果 eligibility = ${passed}. 私密分数被用于证明计算，但不会在结果中显示。</p>
        `
      }

      verifyButton.addEventListener('click', renderResult)
      scoreInput.addEventListener('input', renderResult)
      thresholdInput.addEventListener('input', renderResult)
    </script>
  </body>
</html>
