<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Private Score Pass</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="header">
          <p class="eyebrow">Aleo 101 Bootcamp</p>
          <h1>Private Score Pass</h1>
          <p class="summary">
            输入一个私密分数，只公开阈值与是否达标的验证结果。原始分数作为
            Leo private input，不应出现在链上明文数据中。
          </p>
        </div>

        <form class="controls" id="score-form">
          <label>
            <span>私密分数</span>
            <input id="score" type="number" min="0" max="100" value="88" />
          </label>
          <label>
            <span>公开阈值</span>
            <input id="threshold" type="number" min="0" max="100" value="60" />
          </label>
          <button type="submit">生成验证命令</button>
        </form>

        <section class="result" aria-live="polite">
          <div>
            <span class="label">本地判断</span>
            <strong id="status">通过</strong>
          </div>
          <div>
            <span class="label">公开输出</span>
            <strong id="public-output">true</strong>
          </div>
          <div>
            <span class="label">私密输入</span>
            <strong id="private-input">88u8</strong>
          </div>
        </section>

        <section class="commands">
          <h2>Leo 命令</h2>
          <pre id="run-command"></pre>
          <pre id="execute-command"></pre>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
