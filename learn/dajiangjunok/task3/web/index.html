<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Task3 - Private Add Demo</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --card: #fffdfa;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-2: #14b8a6;
      --line: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, #d1fae5 0%, transparent 35%),
        radial-gradient(circle at 85% 90%, #bfdbfe 0%, transparent 35%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
    }
    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    .primary {
      background: var(--accent);
      color: #fff;
    }
    .ghost {
      background: #e2e8f0;
      color: #0f172a;
    }
    .result {
      margin-top: 18px;
      padding: 14px;
      border: 1px dashed #94a3b8;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 14px;
      line-height: 1.6;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Private Add Demo</h1>
    <p>
      一个最小的 Task3 演示：输入两个私有值，模拟 Leo 程序 <span class="mono">private_add</span> 的执行结果。
      实际接链时可将本地计算替换为钱包/SDK 调用。
    </p>

    <div class="grid">
      <div>
        <label for="a">私有输入 a</label>
        <input id="a" type="number" value="7" min="0" />
      </div>
      <div>
        <label for="b">私有输入 b</label>
        <input id="b" type="number" value="11" min="0" />
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="runBtn">执行私密加法</button>
      <button class="ghost" id="resetBtn">重置</button>
    </div>

    <div class="result" id="result">
      等待执行...
    </div>
  </main>

  <script>
    const aInput = document.getElementById('a');
    const bInput = document.getElementById('b');
    const runBtn = document.getElementById('runBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resultEl = document.getElementById('result');

    function runPrivateAdd() {
      const a = Number(aInput.value);
      const b = Number(bInput.value);

      if (!Number.isFinite(a) || !Number.isFinite(b) || a < 0 || b < 0) {
        resultEl.textContent = '请输入非负数字。';
        return;
      }

      // 本地模拟 Leo 程序 private_add(a, b)。
      const result = a + b;
      const txId = 'demo_' + Date.now();

      resultEl.innerHTML = [
        '执行成功',
        'private_add(' + a + ', ' + b + ') = ' + result,
        'Demo TxID: ' + txId
      ].join('<br/>');
    }

    function reset() {
      aInput.value = 7;
      bInput.value = 11;
      resultEl.textContent = '等待执行...';
    }

    runBtn.addEventListener('click', runPrivateAdd);
    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
