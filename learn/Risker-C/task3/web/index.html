<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Private Score Gate</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(960px, 100%);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: stretch;
      }

      section,
      aside {
        background: #ffffff;
        border: 1px solid #dfe4ef;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(23, 32, 51, 0.08);
        padding: 24px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.15;
        margin-bottom: 10px;
      }

      h2 {
        font-size: 16px;
        margin-bottom: 14px;
      }

      p {
        color: #566276;
        line-height: 1.55;
      }

      label {
        display: grid;
        gap: 8px;
        margin-top: 16px;
        color: #30394d;
        font-size: 14px;
        font-weight: 650;
      }

      input {
        width: 100%;
        border: 1px solid #c6cedd;
        border-radius: 6px;
        padding: 12px 14px;
        font: inherit;
        color: #172033;
        background: #fbfcff;
      }

      button {
        width: 100%;
        margin-top: 18px;
        border: 0;
        border-radius: 6px;
        padding: 13px 16px;
        font: inherit;
        font-weight: 750;
        color: #ffffff;
        background: #1f7a5a;
        cursor: pointer;
      }

      .result {
        min-height: 120px;
        border-radius: 8px;
        border: 1px solid #dfe4ef;
        padding: 18px;
        background: #f8fafc;
      }

      .result strong {
        display: block;
        font-size: 34px;
        line-height: 1;
        margin-bottom: 10px;
      }

      .pass strong {
        color: #18724f;
      }

      .fail strong {
        color: #a33939;
      }

      code {
        display: block;
        margin-top: 18px;
        padding: 14px;
        border-radius: 8px;
        background: #172033;
        color: #d9ffe8;
        white-space: pre-wrap;
        line-height: 1.45;
      }

      @media (max-width: 720px) {
        body {
          padding: 18px;
        }

        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Private Score Gate</h1>
        <p>Simulates a Leo privacy flow: the score stays private, the threshold is public, and the UI reveals only the pass/fail result.</p>

        <label>
          Private score
          <input id="score" type="number" min="0" max="100" value="72" />
        </label>

        <label>
          Public threshold
          <input id="threshold" type="number" min="0" max="100" value="60" />
        </label>

        <button id="check">Check Gate</button>
      </section>

      <aside>
        <h2>Gate Result</h2>
        <div id="result" class="result pass">
          <strong>PASS</strong>
          <span>Only boolean eligibility is revealed.</span>
        </div>
        <code id="trace">mint_score(private score)
check(score_card, public threshold)
return passed</code>
      </aside>
    </main>

    <script>
      const score = document.getElementById("score");
      const threshold = document.getElementById("threshold");
      const result = document.getElementById("result");
      const trace = document.getElementById("trace");

      function render() {
        const privateScore = Number(score.value || 0);
        const publicThreshold = Number(threshold.value || 0);
        const passed = privateScore >= publicThreshold;
        result.className = `result ${passed ? "pass" : "fail"}`;
        result.innerHTML = `<strong>${passed ? "PASS" : "FAIL"}</strong><span>${passed ? "Threshold satisfied" : "Threshold not satisfied"}; raw score remains private.</span>`;
        trace.textContent = `mint_score(${privateScore}u64 private)\ncheck(score_card, ${publicThreshold}u64 public)\nreturn ${passed}`;
      }

      document.getElementById("check").addEventListener("click", render);
      score.addEventListener("input", render);
      threshold.addEventListener("input", render);
      render();
    </script>
  </body>
</html>
